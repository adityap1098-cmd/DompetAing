# DompetAing — Nginx Site Config
# Web:  dompetaing.usahasukses.net → 127.0.0.1:3010
# API:  dompetapi.usahasukses.net  → 127.0.0.1:3011

# ── Web Frontend ──
server {
    listen 80;
    listen 443 ssl;
    server_name dompetaing.usahasukses.net;

    ssl_certificate /etc/letsencrypt/live/dompetaing.usahasukses.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dompetaing.usahasukses.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               image/svg+xml font/woff2;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass http://127.0.0.1:3010;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── API Backend ──
server {
    listen 80;
    listen 443 ssl;
    server_name dompetapi.usahasukses.net;

    ssl_certificate /etc/letsencrypt/live/dompetaing.usahasukses.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dompetaing.usahasukses.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types application/json text/plain;

    location /v1/subscription/webhook {
        proxy_pass http://127.0.0.1:3011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
