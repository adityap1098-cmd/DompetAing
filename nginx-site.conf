# ══════════════════════════════════════════════════════════
# DompetAing — Nginx Site Config (untuk host nginx)
#
# Copy file ini ke VPS:
#   sudo cp nginx-site.conf /etc/nginx/sites-available/dompetaing
#   sudo ln -s /etc/nginx/sites-available/dompetaing /etc/nginx/sites-enabled/dompetaing
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (certbot):
#   sudo certbot --nginx -d dompetaing.usahasukses.net -d api.dompetaing.usahasukses.net
# ══════════════════════════════════════════════════════════

# ── Web Frontend ──
server {
    listen 80;
    server_name dompetaing.usahasukses.net;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml
               image/svg+xml font/woff2;

    # Static assets — cache 30 hari
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        proxy_pass http://127.0.0.1:3010;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Semua route → web container
    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── API Backend ──
server {
    listen 80;
    server_name api.dompetaing.usahasukses.net;

    client_max_body_size 10M;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types application/json text/plain;

    # Midtrans webhook — tanpa rate limit
    location /v1/subscription/webhook {
        proxy_pass http://127.0.0.1:3011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Semua API routes
    location / {
        proxy_pass http://127.0.0.1:3011;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
