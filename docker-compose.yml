services:
  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: dompetaing_postgres
    environment:
      POSTGRES_DB: dompetaing
      POSTGRES_USER: dompetaing
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dompetaing -d dompetaing"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API (Hono + Prisma) ──
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: dompetaing_api
    env_file: .env.production
    environment:
      DATABASE_URL: postgresql://dompetaing:${DB_PASSWORD}@postgres:5432/dompetaing
      NODE_ENV: production
      PORT: "3001"
    ports:
      - "127.0.0.1:3011:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Web (React SPA via nginx) ──
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: https://api.dompetaing.usahasukses.net/v1
    container_name: dompetaing_web
    ports:
      - "127.0.0.1:3010:80"
    networks:
      - internal
    restart: always

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
