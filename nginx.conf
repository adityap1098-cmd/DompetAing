# ══════════════════════════════════════════════════════════════════
# DompetAing — Nginx Reverse Proxy + SSL
#
# Domain:  dompetaing.usahasukses.net
# API:     api.dompetaing.usahasukses.net
#
# SETUP SSL (pertama kali di VPS):
# 1. Jalankan deploy.sh --ssl-init
# 2. Uncomment blok server HTTPS di bawah
# 3. Comment/hapus blok "SEBELUM SSL"
# 4. docker compose restart nginx
# ══════════════════════════════════════════════════════════════════

worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──
    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ──
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # ── Gzip ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml
        font/woff2;

    # ── Rate Limiting ──
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=web_limit:10m rate=50r/s;

    # ── Upstreams ──
    upstream api_backend {
        server api:3001;
    }
    upstream web_backend {
        server web:80;
    }

    # ══════════════════════════════════════════
    # HTTP — ACME challenge + redirect
    # ══════════════════════════════════════════
    server {
        listen 80;
        server_name dompetaing.usahasukses.net api.dompetaing.usahasukses.net;

        # Certbot ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # ─── SEBELUM SSL: proxy langsung via HTTP ───
        # Hapus blok ini setelah SSL aktif, ganti dengan redirect di bawah.
        location / {
            # Deteksi berdasarkan hostname
            set $backend web_backend;
            if ($host = "api.dompetaing.usahasukses.net") {
                set $backend api_backend;
            }
            proxy_pass http://$backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ─── SETELAH SSL: uncomment redirect ini, hapus blok di atas ───
        # location / {
        #     return 301 https://$host$request_uri;
        # }
    }

